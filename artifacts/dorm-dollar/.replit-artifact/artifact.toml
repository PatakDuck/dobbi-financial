kind = "mobile"
previewPath = "/"
title = "DormDollar"
version = "1.0.0"
id = "artifacts/dorm-dollar"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 20142

[services.development]
run = "pnpm --filter @workspace/dorm-dollar run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/dorm-dollar", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/dorm-dollar", "run", "serve" ]

[services.env]
PORT = "20142"
BASE_PATH = "/"
